<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Register | Stackly</title>

    <link rel="stylesheet"
          href="css/auth.css">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

    <section class="auth-section">

        <div class="auth-container">

            <!-- Close Button -->

            <a href="index.html"
               class="close-btn">

                <i class="fa-solid fa-xmark"></i>

            </a>


            <!-- Logo -->

            <div class="auth-logo">

                <img src="images/blue-logo.webp"
                     alt="Stackly Logo">

            </div>


            <!-- Heading -->

            <h1>

                Create Your Account

            </h1>

            <p class="auth-subtitle">

                Join Stackly and start exploring
                premium experiences today.

            </p>


            <!-- Register Form -->

            <form action="404.html"
                  method="get">

                <!-- Full Name -->

                <div class="form-group">

                    <label>

                        Full Name

                    </label>

                    <input type="text"
                           placeholder="Enter your full name"
                           required>

                </div>


                <!-- Email -->

                <div class="form-group">

                    <label>

                        Email Address

                    </label>

                    <input type="email"
                           placeholder="Enter your email address"
                           required>

                </div>


                <!-- Password -->

                <div class="form-group">

                    <label>

                        Password

                    </label>

                    <input type="password"
                           placeholder="Create a password"
                           required>

                </div>


                <!-- Confirm Password -->

                <div class="form-group">

                    <label>

                        Confirm Password

                    </label>

                    <input type="password"
                           placeholder="Confirm your password"
                           required>

                </div>


                <!-- Password Hint -->

                <div class="password-note">

                    Password must contain at least
                    8 characters including letters
                    and numbers.

                </div>


                <!-- Sign Up Button -->

                <button type="submit"
                        class="auth-btn">

                    Sign Up

                </button>

            </form>


            <!-- Login Link -->

            <div class="auth-footer">

                <p>

                    Already have an account?

                    <a href="login.html">

                        Login Now

                    </a>

                </p>

            </div>

        </div>

    </section>

    <script src="js/script.js"></script>
</body>

</html>
