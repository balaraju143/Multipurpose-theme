<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Login | Stackly</title>

    <link rel="stylesheet"
          href="css/auth.css">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="preloader" id="preloader">
    <div class="loader">
        <div class="loader-logo">
            <i class="fa-solid fa-layer-group"></i>
            <span>Stackly</span>
        </div>

        <div class="loader-bars">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </div>
</div>



    <section class="auth-section">

        <div class="auth-container">

            <!-- Close Button -->

            <a href="index.html"
               class="close-btn">

                <i class="fa-solid fa-xmark"></i>

            </a>

        
            <div class="auth-logo">

                <img src="images/blue-logo.webp"
                     alt="Stackly Logo">

            </div>


            <!-- Heading -->

            <h1>

                Welcome Back

            </h1>

            <p class="auth-subtitle">

                Log in to continue exploring
                Stackly's premium experiences.

            </p>


            <!-- Login Form -->

            <form action="404.html"
                  method="get">

                <!-- Email -->

                <div class="form-group">

                    <label>

                        Email Address

                    </label>

                    <input type="email"
                           placeholder="Enter your email address"
                           required>

                </div>


                <!-- Password -->

                <div class="form-group">

                    <label>

                        Password

                    </label>

                    <input type="password"
                           placeholder="Enter your password"
                           required>

                </div>


                <!-- Forgot Password -->

                <div class="forgot-password">

                    <a href="404.html">

                        Forgot Password?

                    </a>

                </div>


                <!-- Login Button -->

                <button type="submit"
                        class="auth-btn">

                    Login

                </button>

            </form>


            <!-- Register Link -->

            <div class="auth-footer">

                <p>

                    Don't have an account?

                    <a href="register.html">

                        Register Now

                    </a>

                </p>

            </div>

        </div>

    </section>


    <script src="js/script.js"></script>
</body>

</html>
